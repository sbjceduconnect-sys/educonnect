<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="EduConnect - SaiBalaji Junior College Educational Platform. Manage courses, attendance, results, and more." />
    <meta name="theme-color" content="#1976D2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>EduConnect | SaiBalaji Junior College</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<div style="color: #FF5252; padding: 30px; font-family: system-ui, sans-serif; background: #1A1A2E; min-height: 100vh; box-sizing: border-box;">' +
          '<h2 style="margin-top:0;">⚠️ JavaScript Error:</h2>' +
          '<pre style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; overflow: auto; border: 1px solid rgba(255,255,255,0.1); color: #FFCDD2; font-family: monospace;">' + 
          (e.error && e.error.stack ? e.error.stack : e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno) + 
          '</pre>' +
          '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        const errorMsg = e.reason && e.reason.stack ? e.reason.stack : (e.reason || 'Unknown error');
        document.body.innerHTML = '<div style="color: #FF5252; padding: 30px; font-family: system-ui, sans-serif; background: #1A1A2E; min-height: 100vh; box-sizing: border-box;">' +
          '<h2 style="margin-top:0;">⚠️ Unhandled Promise Rejection:</h2>' +
          '<pre style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; overflow: auto; border: 1px solid rgba(255,255,255,0.1); color: #FFCDD2; font-family: monospace;">' + 
          errorMsg + 
          '</pre>' +
          '</div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
